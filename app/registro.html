<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro - FERDEV</title>
  <link rel="stylesheet" href="/css/global.css">
</head>

<body class="auth-page">

<div class="auth-container">
  <div class="auth-card">

    <h1>Crear cuenta</h1>
    <br>

    <input type="text" id="empresa" placeholder="Nombre de la empresa" style="margin-bottom:12px;">

    <input type="text" id="nombre" placeholder="Tu nombre" style="margin-bottom:12px;">

    <input type="email" id="email" placeholder="Correo electrónico" style="margin-bottom:12px;">

    <input type="password" id="password" placeholder="Contraseña de acceso" style="margin-bottom:8px;">

    <label style="display:flex; align-items:center; gap:8px; margin-bottom:16px;">
      <input type="checkbox" onclick="togglePassword('password')" style="width:auto; height:auto;">
      Mostrar contraseña de acceso
    </label>

    <input type="password" id="admin_password" placeholder="Contraseña de administrador" style="margin-bottom:8px;">

    <label style="display:flex; align-items:center; gap:8px; margin-bottom:20px;">
      <input type="checkbox" onclick="togglePassword('admin_password')" style="width:auto; height:auto;">
      Mostrar contraseña de administrador
    </label>

    <button onclick="registrarCuenta()">
      Crear cuenta
    </button>

    <p id="mensaje" class="mensaje"></p>

    <br>

    <a href="/login.html">Ya tengo cuenta</a>

    <br><br>

    <a href="/index.html">Volver al inicio</a>

  </div>
</div>

<script src="/js/registro.js"></script>
<script src="/js/transitions.js"></script>

</body>
</html>
