  <div class="box">

    <h3>Activar modo administrador</h3>

    <br>

    <input

      id="adminPassword"
      placeholder="Contraseña administrador"

    <br><br>

    <button
  id="btnAdmin"
  onclick="activarModoAdmin()"
>

</button>
