<div class="main">
  <h1>Proveedores</h1>
  <br>

  <div class="box">
    <h3>Buscar y filtrar proveedores</h3>
    <br>

    <div class="filters">
      <input type="text" id="buscar" placeholder="Buscar por empresa, nombre, teléfono...">

      <select id="categoria">
        <option value="">Todas las categorías</option>
      </select>

      <select id="tipo">
        <option value="">Todos los tipos</option>
      </select>

      <button onclick="filtrarProveedores()">Filtrar</button>
      <button onclick="limpiarFiltros()">Limpiar</button>
    </div>
  </div>

  <div class="box" id="formProveedor" style="display:none;">
    <h3>Registrar proveedor</h3>
    <br>

    <input type="text" id="nuevoNombre" placeholder="Nombre del contacto">
    <input type="text" id="nuevaEmpresa" placeholder="Empresa">
    <input type="text" id="nuevoTelefono" placeholder="Teléfono">
    <input type="email" id="nuevoEmail" placeholder="Email">
    <input type="text" id="nuevaDireccion" placeholder="Dirección">

    <button onclick="crearProveedor()">Guardar proveedor</button>

    <p class="mensaje" id="mensajeProveedor"></p>
  </div>

  <div class="box">
    <h3>Listado de proveedores</h3>
    <br>

    <table>
      <thead>
  <tr>
    <th>Empresa</th>
    <th>Contacto</th>
    <th>Teléfono</th>
    <th>Email</th>
    <th>Dirección</th>

    <th id="accionesHeader" style="display:none;">
      Admin
    </th>
  </tr>
</thead>

      <tbody id="proveedores"></tbody>
    </table>
  </div>
</div>

<script src="../js/auth.js"></script>
<script>
  verificarSesion();
</script>

<script src="../js/proveedores.js"></script>
