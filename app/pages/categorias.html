<html lang="es">

  <meta charset="UTF-8">

</head>

<body>

<div class="sidebar">
  <h2>Ferretería</h2>

  <ul class="menu">

  <li >
    <a href="/app/pages/dashboard.html">Dashboard</a>
  </li>

  <li>

  <li>

  <li>

  </li>

</ul>
</div>

<div class="main">
  <h1>Categorías</h1>
  <br>

  <div class="box">
    <h3>Crear categoría</h3>
    <br>

    <input type="text" id="nombreCategoria" placeholder="Nombre de categoría">
    <button onclick="crearCategoria()">Guardar categoría</button>

    <p class="mensaje" id="mensajeCategoria"></p>
  </div>

  <div class="box">
    <h3>Crear tipo</h3>
    <br>

    <select id="categoriaTipo">
      <option value="">Seleccionar categoría</option>
    </select>

    <input type="text" id="nombreTipo" placeholder="Nombre del tipo">
    <button onclick="crearTipo()">Guardar tipo</button>

    <p class="mensaje" id="mensajeTipo"></p>
  </div>

  <div class="box">
    <h3>Crear variante</h3>
    <br>

    <select id="categoriaVariante">
      <option value="">Seleccionar categoría</option>
    </select>

    <select id="tipoVariante">
      <option value="">Seleccionar tipo</option>
    </select>

    <input type="text" id="nombreVariante" placeholder="Nombre de variante">
    <button onclick="crearVariante()">Guardar variante</button>

    <p class="mensaje" id="mensajeVariante"></p>
  </div>

  <div class="box">
    <h3>Listado de categorías</h3>
    <br>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Categoría</th>
        </tr>
      </thead>
      <tbody id="tablaCategorias"></tbody>
    </table>
  </div>
</div>

<script src="../js/auth.js"></script>
<script>
  verificarSesion();
</script>

<script src="../js/categorias.js"></script>

</body>
</html>
