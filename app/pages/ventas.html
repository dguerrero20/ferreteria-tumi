<!-- MAIN -->
<div class="main">

  <h1>Ventas</h1>

  <br>

  <div class="layout">

    <!-- IZQUIERDA -->
    <div>

      <!-- DATOS DE VENTA -->
      <div class="box">

        <h3>Datos de venta</h3>

        <br>

        <label>Vendedor:</label>

        <select id="vendedor">
          <option value="">Seleccionar vendedor</option>
        </select>

      </div>

      <!-- BUSCADOR -->
      <div class="box">

        <h3>Buscar producto</h3>

        <br>

        <input
          type="text"
          id="buscar"
          placeholder="Buscar clavos, martillo, marca..."
        >

        <button onclick="buscarProductos()">
          Buscar
        </button>

      </div>

      <!-- RESULTADOS -->
      <div class="box">

        <h3>Resultados</h3>

        <br>

        <table>

          <thead>
            <tr>
              <th>Producto</th>
              <th>Precio</th>
              <th>Stock</th>
              <th>Unidad</th>
              <th>Acción</th>
            </tr>
          </thead>

          <tbody id="resultados"></tbody>

        </table>

      </div>

    </div>

    <!-- DERECHA -->
    <div>

      <div class="box">

        <h3>Carrito de venta</h3>

        <br>

        <table>

          <thead>
            <tr>
              <th>Producto</th>
              <th>Cant.</th>
              <th>Subtotal</th>
              <th></th>
            </tr>
          </thead>

          <tbody id="carrito"></tbody>

        </table>

        <div class="total">
          Total: S/
          <span id="total">0.00</span>
        </div>

        <button
          class="success"
          onclick="registrarVenta()"
        >
          Registrar venta
        </button>

        <p
          class="mensaje"
          id="mensaje"
        ></p>

      </div>

    </div>

  </div>

</div>

<script src="../js/auth.js"></script>

<script>
  verificarSesion();
</script>

<script src="../js/ventas.js"></script>

</body>
