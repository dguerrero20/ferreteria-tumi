<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Restablecer contraseña admin</title>
  <link rel="stylesheet" href="/css/global.css">
</head>

<body class="auth-page">

<div class="auth-container">
  <div class="auth-card">
    <h1>Nueva contraseña admin</h1>
    <br>

    <p>
      La contraseña debe tener mínimo 8 caracteres, una mayúscula,
      una minúscula, un número y un carácter especial (*#&%).
    </p>

    <br>

    <input type="password" id="adminPassword" placeholder="Nueva contraseña admin">
    <br><br>

    <input type="password" id="confirmAdminPassword" placeholder="Confirmar contraseña admin">
    <br><br>

    <label style="display:flex; align-items:center; gap:8px;">
      <input type="checkbox" onclick="toggleAdminPassword()" style="width:auto; height:auto;">
      Mostrar contraseña
    </label>

    <br>

    <button onclick="restablecerAdminPassword()">
      Cambiar contraseña admin
    </button>

    <p class="mensaje" id="mensaje"></p>

    <br>

    <a href="/login.html">Volver al login</a>

    <br><br>

    <a href="/index.html">Volver al inicio</a>
  </div>
</div>

<script src="/js/restablecer-admin.js"></script>
<script src="/js/transitions.js"></script>

</body>
</html>
