<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Restablecer contraseña admin</title>
  <link rel="stylesheet" href="/css/global.css">
</head>
<body>

<div class="main" style="max-width: 440px; margin: 80px auto;">
  <div class="box">
    <h1>Nueva contraseña admin</h1>
    <br>

    <p>
      La contraseña debe tener mínimo 8 caracteres, una mayúscula,
      una minúscula, un número y un carácter especial (*#&%).
    </p>

    <br>

    <label>Nueva contraseña administrador</label>
    <input type="password" id="adminPassword" placeholder="Nueva contraseña admin" style="width:100%;">
    <br><br>

    <label>Confirmar contraseña administrador</label>
    <input type="password" id="confirmAdminPassword" placeholder="Confirmar contraseña admin" style="width:100%;">
    <br><br>

    <label style="display:flex; align-items:center; gap:8px;">
      <input type="checkbox" onclick="toggleAdminPassword()" style="width:auto;">
      Mostrar contraseña
    </label>

    <br>

    <button onclick="restablecerAdminPassword()" style="width:100%;">
      Cambiar contraseña admin
    </button>

    <p class="mensaje" id="mensaje"></p>

    <br>
    <a href="/login.html">Volver al login</a>
  </div>
</div>

<script src="/js/restablecer-admin.js"></script>
</body>
</html>
