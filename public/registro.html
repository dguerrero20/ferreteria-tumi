<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro - Ferretería SaaS</title>
  <link rel="stylesheet" href="./css/landing.css">
</head>
<body>

<section class="section">

  <div class="pricing">

    <h3>Crear cuenta</h3>

    <br>

    <input
      type="text"
      id="empresa"
      placeholder="Nombre de la empresa"
      style="width:100%; margin-bottom:12px;"
    >

    <input
      type="text"
      id="nombre"
      placeholder="Tu nombre"
      style="width:100%; margin-bottom:12px;"
    >

    <input
      type="email"
      id="email"
      placeholder="Correo electrónico"
      style="width:100%; margin-bottom:12px;"
    >

    <!-- PASSWORD ACCESO -->
    <input
      type="password"
      id="password"
      placeholder="Contraseña de acceso"
      style="width:100%; margin-bottom:8px;"
    >

    <label style="display:flex; align-items:center; gap:8px; margin-bottom:16px;">
      <input
        type="checkbox"
        onclick="togglePassword('password')"
        style="width:auto;"
      >
      Mostrar contraseña de acceso
    </label>

    <!-- PASSWORD ADMIN -->
    <input
      type="password"
      id="admin_password"
      placeholder="Contraseña de administrador"
      style="width:100%; margin-bottom:8px;"
    >

    <label style="display:flex; align-items:center; gap:8px; margin-bottom:20px;">
      <input
        type="checkbox"
        onclick="togglePassword('admin_password')"
        style="width:auto;"
      >
      Mostrar contraseña de administrador
    </label>

    <button
      onclick="registrarCuenta()"
      class="btn-primary"
      style="width:100%; border:none;"
    >
      Crear cuenta
    </button>

    <p id="mensaje" style="margin-top:15px;"></p>

    <br>

    <a href="/app/login.html">
      Ya tengo cuenta
    </a>

  </div>

</section>

<script src="./js/registro.js"></script>

</body>
</html>
